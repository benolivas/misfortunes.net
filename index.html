<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>misfortunes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <script src="fortuneArray.js"></script>
  <script src="main.js"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <!-- Disclaimer Popup -->
  <div id="age-verify">
    <div class="window">
      <span class="title">Your Loss.</span>
      <span class="body-text">These fortunes may be rude, absurd, and legally inadmissible. If you're looking for wisdom, look elsewhere. If you're looking for trouble&hellip; enjoy.</span>
      <span class="fine-print">We remember your visit so you don&rsquo;t get the same fortune twice. We don&rsquo;t know who you are and frankly don&rsquo;t care.</span>
      <div class="button-container">
        <button class="yes" onclick="overAge()">Enter</button>
        <button class="no" onclick="goBack()">Leave</button>
      </div>
    </div>
  </div>

  <!-- Fortune Cookie -->
  <div title="click for a new fortune" class="container">
    <div class="cookie-wrap">
      <img class="fortune-img" src="images/fortune-cookie.png" alt="">
      <p class="fortune-text"><span id="fortuneText"></span></p>
    </div>
  </div>

</body>
</html>
