<head>
  <meta charset="UTF-8">
  <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js" type="text/javascript"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:wght@400;700&family=Newsreader:wght@400&display=swap" rel="stylesheet">
  <script type="text/javascript" src="fortuneArray.js" charset="utf-8"></script>
  <script type="text/javascript" src="main.js" charset="utf-8"></script>
  <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>

  <!-- Disclaimer Popup -->
  <div id="age-verify">
    <div class="window">
      <span class="title">DISCLAIMER</span>
      <span>These fortunes may be rude, absurd, and legally inadmissible. If you're looking for wisdom, look elsewhere. If you're looking for trouble… enjoy.</span>
      <div class="button-container">
        <button class="yes" onclick="overAge()">ENTER</button>
        <button class="no" onclick="goBack()">LEAVE</button>
      </div>
    </div>
  </div>

  <!-- Fortune Cookie Section -->
  <div title="click for a new fortune" class="container">
    <p class="fortune-text"><span id="fortuneText"></span></p>
    <img class="fortune" src="images/fortune-cookie.png">
  </div>

</body>
